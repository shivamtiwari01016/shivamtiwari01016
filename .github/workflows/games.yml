name: Generate GitHub Profile Games

on:
  schedule:
    - cron: "0 0 * * *" # Runs every night
  workflow_dispatch: # Allows manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: generate-game-assets
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: shivamtiwari01016
          # FIXED INDENTATION BELOW
          outputs: |
            # 1. PAC-MAN Style
            dist/pacman.svg?color_snake=yellow&color_dots=#0000FF&palette=github-dark
            
            # 2. TETRIS Style
            dist/tetris.svg?color_snake=orange&palette=github-light
            
            # 3. CHARACTER WALKING Style
            dist/rpg-walk.svg?color_snake=#3c7dd9&color_dots=#bfd6f6&palette=github-dark
            
            # 4. MATRIX Style
            dist/matrix.svg?color_snake=#00FF00&color_dots=#003300&palette=github-dark
            
            # 5. BATTLEFIELD (3D City Strike)
            dist/battlefield-strike.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: push-to-output-branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
